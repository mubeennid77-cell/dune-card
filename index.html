<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DUNE Contact Card</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="card">

<div class="logo-area">
<img src="logo.jpg" alt="DUNE Logo">
</div>

<div class="name">NAMRAZ P.N</div>
<div class="title">CEO</div>

<div class="info">

<div class="row">
<i class="fas fa-phone"></i>
<div>
<span>Mobile Number</span>
<p>+974 3322 1297</p>
</div>
</div>

<div class="row">
<i class="fas fa-envelope"></i>
<div>
<span>Email Address</span>
<p>namraz.nazer@dunetraders.com</p>
</div>
</div>

<div class="row">
<i class="fas fa-globe"></i>
<div>
<span>Website Address</span>
<p>www.dunetraders.com</p>
</div>
</div>

<div class="row">
<i class="fas fa-location-dot"></i>
<div>
<span>Address</span>
<p>Building No.15, Zone 14,<br>Street 339, Doha-Qatar<br>P.O. Box: 4413</p>
</div>
</div>

</div>

<button class="btn" onclick="saveContact()">
<i class="fas fa-user-plus"></i> ADD TO CONTACT
</button>
<button class="btn" onclick="saveContact()">ADD TO CONTACT</button>

<script>
function saveContact() {
const vcard =
`BEGIN:VCARD
VERSION:3.0
FN:NAMRAZ P.N
ORG:DUNE TRADING AND CONTRACTING
TITLE:CEO
TEL;TYPE=CELL:+97433221297
EMAIL:namraz.nazer@dunetraders.com
URL:https://www.dunetraders.com
ADR:;;Building No.15, Zone 14, Street 339, Doha-Qatar;Doha;;;Qatar
END:VCARD`;

const blob = new Blob([vcard], { type: 'text/vcard' });
const url = URL.createObjectURL(blob);

const a = document.createElement('a');
a.href = url;
a.download = 'NAMRAZ-PN.vcf';
a.click();

URL.revokeObjectURL(url);
}
</script>

</body>
</html>
</body>
</html>
